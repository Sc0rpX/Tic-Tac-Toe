<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>

    <!-- Fonts: Press Start 2P, Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main-container">
      <h1 id="title">TIC TAC TOE</h1>

      <div id="gameboard">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
      </div>

      <div id="status-text"></div>
      <div id="button-wrapper">
        <button id="reset-btn">Reset</button>
        <button id="new-game-btn">New Game</button>
      </div>
    </div>

    <!-- Overlay Dialog -->
     <dialog id="name-entry-dialog">
      <h2 id="dialog-title">Enter Player Names</h2>
      <form method="dialog">
        <div id="form-inputs">
          <div id="left-form">
            <label for="player1-name" class="player-name-label">Player 1:</label><br>
            <input type="text" name="player1-name" id="player1-name" class="name-input-field">
          </div>
          <div id="right-form">
            <label for="player2-name" class="player-name-label">Player 2:</label><br>
            <input type="text" name="player2-name" id="player2-name" class="name-input-field">
          </div>
        </div>
        <div id="form-button">
          <button id="start-game">Start Game</button>
        </div>
      </form>
     </dialog>
  </body>
</html>
